version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: jy_rentcar_db
    restart: always
    environment:
      MYSQL_DATABASE: jy_rentcar
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: jy_user
      MYSQL_PASSWORD: jy_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: jy_rentcar_backend
    restart: always
    expose:
      - "3000"
    environment:
      DB_HOST: db
      DB_USER: jy_user
      DB_PASSWORD: jy_password
      DB_NAME: jy_rentcar
      JWT_SECRET: super_secret_key_123
    volumes:
      - car_uploads:/app/uploads
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: jy_rentcar_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - car_uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend

volumes:
  db_data:
  car_uploads:
