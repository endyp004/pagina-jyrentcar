include /etc/nginx/mime.types;

server {
    listen 80;
    server_name jyrentcar.net www.jyrentcar.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jyrentcar.net www.jyrentcar.net;

    ssl_certificate /etc/letsencrypt/live/jyrentcar.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jyrentcar.net/privkey.pem;

    # Global Security Headers (Updated to allow blob: previews)
    # Temporarily disabled for troubleshooting
    # add_header Content-Security-Policy ...;
    # add_header X-Frame-Options "DENY" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optimized Car Images (WebP)
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        try_files $uri =404;
        access_log off;
        expires max;
        add_header Cache-Control "public, no-transform";
    }

    # Static Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires max;
    }

    # Fallback for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
